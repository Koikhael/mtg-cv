<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Site Under Construction</title>
  <style>
    body {
      margin: 0;
      padding: 40px;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #111827 0%, #1f2937 50%, #374151 100%);
      color: #f8fafc;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      text-align: center;
      box-sizing: border-box;
    }

    .container {
      width: 100%;
      max-width: 520px;
      padding: 32px;
      margin: auto;
      border-radius: 24px;
      background: rgba(15, 23, 42, 0.88);
      box-shadow: 0 24px 80px rgba(15, 23, 42, 0.35);
      backdrop-filter: blur(12px);
    }

    .title {
      margin: 0;
      font-size: clamp(2rem, 4vw, 3.25rem);
      letter-spacing: -0.05em;
    }

    .subtitle {
      margin: 16px 0 32px;
      font-size: 1.1rem;
      line-height: 1.7;
      color: #cbd5e1;
    }

    .spinner {
      width: 120px;
      height: 8px;
      margin: 0 auto;
      border-radius: 999px;
      background: rgba(148, 163, 184, 0.18);
      overflow: hidden;
      position: relative;
    }

    .spinner::before {
      content: '';
      position: absolute;
      left: -40%;
      top: 0;
      width: 40%;
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, transparent, #60a5fa, #38bdf8, transparent);
      animation: spin-bar 1.4s ease-in-out infinite;
    }

    @keyframes spin-bar {
      0% {
        left: -40%;
      }
      50% {
        left: 60%;
      }
      100% {
        left: -40%;
      }
    }

    .footer {
      margin-top: 28px;
      font-size: 0.9rem;
      color: #94a3b8;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1 class="title">Work In Progress</h1>
    <p class="subtitle">This site is currently under construction. Please check back soon while we build something great.</p>
    <div class="spinner" aria-hidden="true"></div>
    <p class="footer">Michael Tigin-Gerber</p>
  </div>
</body>
</html>
